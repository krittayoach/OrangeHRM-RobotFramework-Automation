มินิโปรเจกต์นี้เป็นส่วนหนึ่งของการทดลองทำ Automated Software Testing 
ใช้สำหรับทดสอบระบบจัดการทรัพยากรบุคคล [OrangeHRM Demo](https://opensource-demo.orangehrmlive.com/) 
โดยพัฒนาขึ้นด้วย **Robot Framework** และ **SeleniumLibrary** โดยใช้โครงสร้างแบบ Page Object Model (POM) เพื่อให้ง่ายต่อการดูแลรักษาโค้ด

##ขอบเขตการทดสอบ (Test Scope)
โปรเจกต์นี้ครอบคลุมการทดสอบ 3 โมดูลหลัก ได้แก่:
1. **Authentication:** ทดสอบการเข้าสู่ระบบสำเร็จและไม่สำเร็จ (TC-1 ถึง TC-3)
2. **Admin Module (User Management):** ทดสอบการเพิ่มผู้ใช้ใหม่ ตรวจสอบรหัสผ่าน และการค้นหา (TC-4 ถึง TC-6)
3. **PIM Module (Employee Management):** ทดสอบการเพิ่มพนักงานใหม่พร้อมอัปโหลดรูปภาพ และตรวจสอบข้อมูล (TC-7 ถึง TC-8)

##สิ่งที่ต้องติดตั้ง (Prerequisites)
ก่อนที่จะรันโปรเจกต์นี้ กรุณาตรวจสอบให้แน่ใจว่าเครื่องคอมพิวเตอร์ของคุณได้ติดตั้งซอฟต์แวร์ดังต่อไปนี้:
* Python (เวอร์ชัน 3.x ขึ้นไป)
* Google Chrome Browser

ติดตั้ง Libraries ที่จำเป็นผ่านคำสั่ง:
pip install robotframework
pip install robotframework-seleniumlibrary